name: Build Chrome Extension

run-name: Build extension for ${{ github.ref_name }} @ ${{ github.sha }}

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ARTIFACT_SUFFIX: ${{ github.run_number }}-${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build extension
        run: npm run build

      - name: Write build metadata
        run: |
          cat > dist/build-info.json <<EOF
          {
            "commit": "${{ github.sha }}",
            "ref": "${{ github.ref_name }}",
            "runNumber": "${{ github.run_number }}",
            "runId": "${{ github.run_id }}",
            "builtAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Archive dist folder
        run: |
          cd dist
          zip -r ../servicenow-form-filler-dist-${{ github.run_number }}-${{ github.sha }}.zip .

      - name: Upload dist folder artifact
        uses: actions/upload-artifact@v7
        with:
          name: servicenow-form-filler-dist-${{ github.run_number }}-${{ github.sha }}
          path: dist

      - name: Upload zipped extension artifact
        uses: actions/upload-artifact@v7
        with:
          name: servicenow-form-filler-zip-${{ github.run_number }}-${{ github.sha }}
          path: servicenow-form-filler-dist-${{ github.run_number }}-${{ github.sha }}.zip