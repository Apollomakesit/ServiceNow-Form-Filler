name: Build Chrome Extension

run-name: Build extension for ${{ github.ref_name }} @ ${{ github.sha }}

concurrency:
  group: build-extension-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ARTIFACT_SUFFIX: ${{ github.run_number }}-${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Stamp manifest build version
        run: |
          node <<'EOF'
          const fs = require('fs');
          const manifestPath = 'manifest.json';
          const packagePath = 'package.json';

          const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
          const pkg = JSON.parse(fs.readFileSync(packagePath, 'utf8'));

          const [major = '1', minor = '0'] = String(pkg.version || '1.0.0').split('.');
          const runNumber = process.env.GITHUB_RUN_NUMBER;
          const sha = process.env.GITHUB_SHA.slice(0, 7);

          manifest.version = `${major}.${minor}.${runNumber}`;
          manifest.version_name = `${pkg.version}+build.${runNumber}.${sha}`;

          fs.writeFileSync(manifestPath, JSON.stringify(manifest, null, 2) + '\n');
          console.log(`Stamped manifest version=${manifest.version} version_name=${manifest.version_name}`);
          EOF

      - name: Run tests
        run: npm test

      - name: Build extension
        run: npm run build

      - name: Write build metadata
        run: |
          cat > dist/build-info.json <<EOF
          {
            "commit": "${{ github.sha }}",
            "ref": "${{ github.ref_name }}",
            "runNumber": "${{ github.run_number }}",
            "runId": "${{ github.run_id }}",
            "manifestVersion": "$(node -p "require('./manifest.json').version")",
            "manifestVersionName": "$(node -p "require('./manifest.json').version_name")",
            "builtAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Archive dist folder
        run: |
          cd dist
          zip -r ../servicenow-form-filler-dist-${{ github.run_number }}-${{ github.sha }}.zip .

      - name: Upload dist folder artifact
        uses: actions/upload-artifact@v7
        with:
          name: servicenow-form-filler-dist-${{ github.run_number }}-${{ github.sha }}
          path: dist

      - name: Upload zipped extension artifact
        uses: actions/upload-artifact@v7
        with:
          name: servicenow-form-filler-zip-${{ github.run_number }}-${{ github.sha }}
          path: servicenow-form-filler-dist-${{ github.run_number }}-${{ github.sha }}.zip