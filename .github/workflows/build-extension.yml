name: Build Chrome Extension

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build extension
        run: npm run build

      - name: Archive dist folder
        run: |
          cd dist
          zip -r ../servicenow-form-filler-dist.zip .

      - name: Upload dist folder artifact
        uses: actions/upload-artifact@v7
        with:
          name: servicenow-form-filler-dist
          path: dist

      - name: Upload zipped extension artifact
        uses: actions/upload-artifact@v7
        with:
          name: servicenow-form-filler-zip
          path: servicenow-form-filler-dist.zip